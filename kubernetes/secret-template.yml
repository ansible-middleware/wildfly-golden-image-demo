# Database Secret Template
# Create actual secret using:
# kubectl create secret generic wildfly-db-secret \
#   --from-literal=host=postgres.example.com \
#   --from-literal=database=mydb \
#   --from-literal=username=wildfly \
#   --from-literal=password=YOUR_SECURE_PASSWORD

# Or apply this file after base64-encoding the values:
# echo -n "postgres.example.com" | base64

apiVersion: v1
kind: Secret
metadata:
  name: wildfly-db-secret
type: Opaque
data:
  # Base64-encoded values (replace with actual values)
  host: cG9zdGdyZXMuZXhhbXBsZS5jb20=        # postgres.example.com
  database: bXlkYg==                          # mydb
  username: d2lsZGZseQ==                      # wildfly
  password: WU9VUl9TRUNVUkVfUEFTU1dPUkQ=      # YOUR_SECURE_PASSWORD
