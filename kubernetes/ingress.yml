apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wildfly-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - wildfly.example.com
    secretName: wildfly-tls-secret
  rules:
  - host: wildfly.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wildfly
            port:
              number: 8080
