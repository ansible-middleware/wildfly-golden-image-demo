apiVersion: apps/v1
kind: Deployment
metadata:
  name: wildfly-golden
  labels:
    app: wildfly
    tier: application
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wildfly
  template:
    metadata:
      labels:
        app: wildfly
        tier: application
    spec:
      containers:
      - name: wildfly
        image: wildfly-golden:demo
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9990
          name: management
          protocol: TCP
        env:
        # Database configuration (injected at runtime)
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: wildfly-db-secret
              key: host
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: wildfly-db-secret
              key: database
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: wildfly-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wildfly-db-secret
              key: password
        # JVM tuning (optional overrides)
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx2048m -XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=512m"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
      restartPolicy: Always
      # For private registries, uncomment and configure:
      # imagePullSecrets:
      # - name: ghcr-secret
